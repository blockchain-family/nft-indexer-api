env:
  RUST_LOG: "info"
  RUST_BACKTRACE: "1"
  DATABASE__MAX_CONNECTIONS: "50"
  HTTP_ADDRESS: "0.0.0.0:9000"
  AUTH_TOKEN_LIFETIME: "31536000"
  BASE_URL: "api-tycho-testnet.tokstock.io"
  DEX_URL: "https://api-test-tycho.flatqube.io"
  MAIN_TOKEN: "0:6b3355b19c6aedc65be291c00abbf6e5061c07e1926a3fd543863c7a8d06cc79"
  INDEXER_API_URL: "http://nft-nft-indexer-tycho-testnet:3001"
  TOKEN_MANIFEST_PATH: "https://raw.githubusercontent.com/broxus/ton-assets/refs/heads/tychotestnet/manifest.json"
  SERVICE_NAME: "Tokstock"

controller: statefulset

service:
  port: 9000

containerCommand:
  - /bin/sh
  - -ec

containerArguments:
  - |
    . /vault/secrets/config
    export DATABASE__URL="postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@10.163.10.14:5432/nft-indexer-tycho-testnet"
    exec /app/entrypoint.sh

vault:
  enabled: true
  role: "nft-nft-indexer-api-tycho-testnet"
  file:
    name: config
    path: kubernetes/data/broxus/main/nft-tycho-testnet/nft-indexer-api
    template: |
      {{- with secret "kubernetes/data/broxus/main/nft-tycho-testnet/nft-indexer-api" -}}
      {{- range $k, $v := .Data.data }}
      export {{ $k }}={{ printf "%q" $v }}
      {{- end }}
      {{- end -}}

podSecurityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

gateway:
  hosts:
    - host: api-tycho-testnet.tokstock.io
      paths:
        - path: /
          pathType: PathPrefix
          port: 9000

livenessProbe:
  httpGet:
    path: /healthz
    port: 9000
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 9000
  initialDelaySeconds: 5
  periodSeconds: 10
