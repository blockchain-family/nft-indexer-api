include:
  - project: "infrastructure/gitlab-ci"
    ref: main
    file: "/templates/docker-dedicated-common.gitlab-ci.yaml"
  - project: "infrastructure/gitlab-ci"
    ref: main
    file: "templates/deploy-v2.gitlab-ci.yaml"

stages:
  - build
  - deploy

build:
  only:
    - tokstock
  except:
    - tags
  extends: .build:common

deploy:prod-tokstock:
  only:
    - tokstock
  except:
    - tags
  variables:
    K8S_NAMESPACE: nft-tokstock
    APP_CONFIG: tokstock
  extends: .deploy
  environment:
    name: prod
    on_stop: stop:prod-tokstock
  tags: ["broxus-pve-main"]

stop:prod-tokstock:
  only:
    - tokstock
  except:
    - tags
  variables:
    K8S_NAMESPACE: nft-tokstock
    APP_CONFIG: tokstock
  extends: .stop
  environment:
    name: prod
  tags: ["broxus-pve-main"]
